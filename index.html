<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraViva</title>

    <link rel="stylesheet" href="assets/css/style.css"/>
    <link rel="stylesheet" href="assets/css/header.css"/>
    <link rel="stylesheet" href="assets/css/body.css"/>
    <link rel="stylesheet" href="assets/css/footer.css"/>

    <!-- ICONES DO MENU -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <div class="container-topbar">
            <img src="assets/imagens/Logo FloraViva.png" alt="Logo" id="logo" class="logo">

            <!-- MENU TOGGLE -->
            <input type="checkbox" id="menu-toggle" class="menu-toggle">

            <!-- ICONES -->
            <label for="menu-toggle" class="menu-icon">
                <i class="fa-solid fa-bars icon-open"></i>
                <i class="fa-solid fa-xmark icon-close"></i>
            </label>

            <!-- MENU -->
            <nav class="nav menu-lateral">
                <a href="#">Inicio</a>
                <a href="#">Especies</a>
                <a href="#">Cultivo</a>
                <a href="#">Contato</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container hero-wrap">
                <div class="hero-text">
                    <h1>Flores raras e botânica viva</h1>
                    <p>Descubra especies ornamentais, exoticas e delicadas para jardim, colecao e estudo botanico em uma experiencia visual leve e elegante.</p>
                    <a class="btn" href="#">Saiba mais</a>
                </div>

                <div class="herro-visual">
                    <img src="assets/imagens/lirio-hero-removebg-preview.png" alt="Foto de um Lirio Rosa Escuro">
                </div>
            </div>
        </section>

        
    </main>

</body>
</html>
